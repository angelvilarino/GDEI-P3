<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuraVault - Dashboard Global</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"></div>
          <h1>AuraVault</h1>
          <nav class="nav-links">
            <a class="nav-link" data-page="dashboard" href="/" data-i18n="dashboard">Dashboard</a>
            <a class="nav-link" data-page="centers" href="/centers" data-i18n="centers">Centros</a>
            <a class="nav-link" data-page="control-center" href="/control" data-i18n="control">Control</a>
          </nav>
        </div>
        <div class="toolbar">
          <button class="btn" id="langToggle">ES</button>
          <button class="btn" id="themeToggle">Oscuro</button>
        </div>
      </header>

      <section class="grid grid-4 stagger" style="margin-top:14px">
        <article class="card kpi"><span class="small" data-i18n="totalVisitors">Visitantes totales</span><span class="value" id="kpiVisitors">Cargando...</span></article>
        <article class="card kpi"><span class="small" data-i18n="roomsOptimal">Salas en rango optimo</span><span class="value" id="kpiRooms">Cargando...</span></article>
        <article class="card kpi"><span class="small" data-i18n="artworksRisk">Obras en riesgo</span><span class="value" id="kpiRisk">Cargando...</span></article>
        <article class="card kpi"><span class="small" data-i18n="activeSensors">Sensores activos</span><span class="value" id="kpiSensors">Cargando...</span></article>
      </section>

      <section class="split" style="margin-top:14px">
        <article class="card fade-up">
          <h3 data-i18n="mapTitle">Mapa de centros culturales</h3>
          <div id="mapSkeleton" class="skeleton" style="height:400px;border-radius:8px;margin-bottom:10px"></div>
          <div id="globalMap" class="leaflet-map" style="display:none"></div>
          <div class="chart-wrap" style="margin-top:10px;height:270px">
            <div id="chartSkeleton" class="skeleton" style="height:270px;border-radius:8px"></div>
            <canvas id="trendChart" style="display:none"></canvas>
          </div>
        </article>

        <aside class="card fade-up">
          <h3 data-i18n="alerts">Alertas</h3>
          <div id="alertsPanel" class="alert-list"></div>
        </aside>
      </section>

      <section style="margin-top:14px">
        <article class="card fade-up">
          <div class="controls-row">
            <strong data-i18n="modelTitle">Modelo de datos</strong>
            <button class="btn" id="toggleMermaid" data-i18n="showHide">Mostrar/Ocultar</button>
          </div>
          <div id="mermaidBody" style="margin-top:8px">
            <div class="mermaid" id="modelMermaid"></div>
          </div>
        </article>
      </section>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  </body>
</html>
