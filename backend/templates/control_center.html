<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuraVault - Centro de Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body data-page="control-center">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"></div>
          <h1>AuraVault Admin</h1>
          <nav class="nav-links">
            <a class="nav-link" data-page="dashboard" href="/" data-i18n="dashboard">Dashboard</a>
            <a class="nav-link" data-page="centers" href="/centers" data-i18n="centers">Centros</a>
            <a class="nav-link" data-page="control-center" href="/control" data-i18n="control">Control</a>
          </nav>
        </div>
        <div class="toolbar">
          <button class="btn" id="langToggle">ES</button>
          <button class="btn" id="themeToggle">Oscuro</button>
        </div>
      </header>

      <section class="card fade-up" style="margin-top:14px">
        <div class="controls-row">
          <button class="btn tab-btn btn-primary" data-target="alerts" data-i18n="alerts">Alertas</button>
          <button class="btn tab-btn" data-target="devices" data-i18n="devices">Dispositivos</button>
          <button class="btn tab-btn" data-target="grafana" data-i18n="grafana">Grafana</button>
        </div>
      </section>

      <section data-tab="alerts" class="card" style="margin-top:14px">
        <h3 data-i18n="alerts">Alertas</h3>
        <div class="controls-row" style="margin:8px 0 12px">
          <select id="alertFilterCenter" class="input"><option value="" data-i18n="allCenters">Centro: todos</option></select>
          <select id="alertFilterType" class="input"><option value="" data-i18n="allTypes">Tipo: todos</option></select>
          <select id="alertFilterSeverity" class="input"><option value="" data-i18n="allSeverity">Severidad: todas</option></select>
          <select id="alertFilterStatus" class="input"><option value="" data-i18n="allState">Estado: todos</option></select>
        </div>
        <div class="chart-wrap" style="height:240px"><canvas id="alertsStatsChart"></canvas></div>
        <div class="table-wrap" style="margin-top:8px;max-height:360px">
          <table>
            <thead><tr><th data-i18n="center">Centro</th><th data-i18n="type">Tipo</th><th data-i18n="severity">Severidad</th><th data-i18n="state">Estado</th><th data-i18n="source">Fuente</th><th data-i18n="date">Fecha</th><th></th></tr></thead>
            <tbody id="alertsTableBody"></tbody>
          </table>
        </div>
      </section>

      <section data-tab="devices" class="card" style="margin-top:14px;display:none">
        <h3 data-i18n="devices">Dispositivos</h3>
        <div class="table-wrap" style="max-height:460px">
          <table>
            <thead><tr><th data-i18n="device">Dispositivo</th><th data-i18n="room">Sala</th><th data-i18n="typeLabel">Tipo</th><th data-i18n="state">Estado</th><th data-i18n="battery">Batería</th><th data-i18n="lastReading">Última lectura</th></tr></thead>
            <tbody id="devicesTableBody"></tbody>
          </table>
        </div>
      </section>

      <section data-tab="grafana" class="card" style="margin-top:14px;display:none">
        <h3 data-i18n="grafana">Grafana</h3>
        <div class="grafana-frame"><iframe id="adminGrafana" title="Grafana admin"></iframe></div>
        <div style="margin-top:10px"><a id="adminGrafanaLink" class="btn" href="#" target="_blank" rel="noreferrer" data-i18n="directLink">Abrir enlace directo</a></div>
      </section>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/control_center.js') }}"></script>
  </body>
</html>
